kind = "web"
previewPath = "/"
title = "VR Lopes LTDA"
version = "1.0.0"
id = "artifacts/vr-lopes"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21243

[services.development]
run = "pnpm --filter @workspace/vr-lopes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vr-lopes", "run", "build" ]
serve = "static"
publicDir = "artifacts/vr-lopes/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21243"
BASE_PATH = "/"
